services:
  - type: web
    name: orma-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: ENVIRONMENT
        value: pilot
      - key: RUN_MIGRATIONS
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: orma-project-90
      - key: FIREBASE_CREDENTIALS_PATH
        value: /etc/secrets/firebase-adminsdk.json
      - key: FIREBASE_STORAGE_BUCKET
        value: orma-project-90.firebasestorage.app
      - key: GSTINCHECK_API_KEY
        sync: false
      - key: GSTINCHECK_BASE_URL
        value: https://sheet.gstincheck.co.in/check
      - key: ALLOWED_ORIGINS
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_REDIRECT_URI
        sync: false
      - key: META_TOKEN_ENCRYPTION_SECRET
        sync: false
      - key: META_SYSTEM_USER_ACCESS_TOKEN
        sync: false
      - key: META_GRAPH_API_VERSION
        value: v25.0
      - key: META_DEFAULT_ORDER_TEMPLATE
        value: orma_order_confirmation
      - key: META_DEFAULT_LANGUAGE_CODE
        value: en_US
      - key: META_OAUTH_SCOPES
        value: business_management,catalog_management,whatsapp_business_management,whatsapp_business_messaging
